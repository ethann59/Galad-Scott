name: Release Manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Numéro de version à publier (ex: 1.0.0)'
        required: true
      branch:
        description: 'Branch source de la release (ex: main ou unstable). Si unstable, la release sera marquée pre-release.'
        required: false
        default: 'main'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Determine pip cache directory (Linux/Mac)
        id: pip-cache-macos-linux
        if: runner.os != 'Windows'
        run: |
          cache=$(python -m pip cache dir 2>/dev/null || python -c "import os; print(os.path.expanduser('~/.cache/pip'))")
          echo "cache=$cache" >> $GITHUB_OUTPUT

      - name: Compute pip cache key (Linux/Mac)
        id: pip-key-linux
        if: runner.os != 'Windows'
        run: |
          if [ -f requirements.lock ]; then
            if command -v sha256sum >/dev/null 2>&1; then
              pip_key=$(sha256sum requirements.lock | cut -d ' ' -f 1)
            else
              pip_key=$(shasum -a 256 requirements.lock | cut -d ' ' -f 1)
            fi
          else
            if command -v sha256sum >/dev/null 2>&1; then
              pip_key=$(sha256sum requirements.txt | cut -d ' ' -f 1)
            else
              pip_key=$(shasum -a 256 requirements.txt | cut -d ' ' -f 1)
            fi
          fi
          echo "pip_key=$pip_key" >> $GITHUB_OUTPUT

      - name: Determine pip cache directory (Windows)
        id: pip-cache-windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            $cache = (python -m pip cache dir 2>$null).Trim()
            if (-not $cache) { throw 'NoOutput' }
          } catch {
            $cache = python -c "import os; print(os.path.expanduser('~/.cache/pip'))"
          }
          Write-Output "cache=$cache" >> $Env:GITHUB_OUTPUT

      - name: Compute pip cache key (Windows)
        id: pip-key-windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path requirements.lock) { $hash = (Get-FileHash requirements.lock -Algorithm SHA256).Hash } else { $hash = (Get-FileHash requirements.txt -Algorithm SHA256).Hash }
          Write-Output "pip_key=$hash" >> $Env:GITHUB_OUTPUT

      - name: Cache pip dependencies (Linux/Mac)
        id: cache-pip-linux
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache-macos-linux.outputs.cache }}
          key: ${{ runner.os }}-pip-${{ steps.pip-key-linux.outputs.pip_key }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Debug steps removed: show pip cache key for Linux/Mac

      - name: Cache pip dependencies (Windows)
        id: cache-pip-windows
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache-windows.outputs.cache }}
          key: ${{ runner.os }}-pip-${{ steps.pip-key-windows.outputs.pip_key }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Debug steps removed: show pip cache key for Windows

      - name: Ensure build directory exists (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build

      - name: Ensure build directory exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build -Force

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('requirements.txt', 'main.py', 'assets/**') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build game with PyInstaller (onedir)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=';'; else SEP=':'; fi
          pyinstaller \
            --noconfirm \
            --clean \
            --onedir \
            --windowed \
            --name galad-scott \
            --add-data "assets${SEP}assets" \
            main.py



      - name: Archive build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-Not (Test-Path "dist/galad-scott")) {
            Write-Error "Build folder dist/galad-scott not found"
            exit 1
          }
          if (Test-Path "galad-scott-windows.zip") {
            Remove-Item "galad-scott-windows.zip" -Force
          }
          Compress-Archive -Path "dist/galad-scott/*" -DestinationPath "galad-scott-windows.zip" -Force

      - name: Archive build (Linux/Mac)  
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux) out="galad-scott-linux.zip" ;;
            macOS) out="galad-scott-macos.zip" ;;
            *) echo "Unsupported OS: $RUNNER_OS"; exit 1 ;;
          esac

          test -d dist/galad-scott
          rm -f "$out"
          (cd dist && zip -r "../$out" galad-scott)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: galad-scott-${{ runner.os }}-v${{ github.event.inputs.version }}
          path: galad-scott-*.zip
          if-no-files-found: error