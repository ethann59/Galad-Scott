site_name: Galad Scott - Documentation
site_description: Documentation complète de Galad Scott - Guide utilisateur et documentation technique
site_author: Équipe Galad Scott
site_url: https://ethann59.github.io/Galad-Scott/

repo_name: ethann59/Galad-Scott
repo_url: https://github.com/ethann59/Galad-Scott

theme:
  name: material
  language: fr
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre / Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair / Switch to light mode

plugins:
  - search:
      lang: fr
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
          nav:
            - Accueil: index.md
            - 📖 Documentation Utilisateur:
              - Introduction & Présentation: user/basics/introduction.md
              - Configuration & Installation: user/basics/installation.md
              - Commandes & Interfaces: user/gameplay/controls.md
              - Gameplay & Progression: user/gameplay/gameplay.md
              - Description Sprites & Conseils: user/units/units.md
              - Ressources supplémentaires:
                - Outil de configuration: user/tools/galad-config-tool.md
                - Guide de démarrage: user/basics/getting-started.md
                - Unités : user/units/units.md
                - Bâtiments: user/economy/buildings.md
                - Boutique: user/economy/shop.md
                - Barre d'action: user/gameplay/action-bar.md
                - Paramètres du jeu: user/basics/settings.md
                - FAQ: user/help/faq.md
                - Crédits: user/help/credits.md
            - 🛠️ Documentation Technique:
              - 1. Introduction:
                - Vue d'ensemble: dev/01-introduction/overview.md
              - 2. Description du système:
                - Architecture ECS: dev/02-systeme/architecture.md
                - Système de tours: dev/02-systeme/tower-system-implementation.md
                - Système de mises à jour: dev/02-systeme/update-system.md
                - API:
                  - Moteur de jeu: dev/02-systeme/api/game-engine.md
                  - Interface utilisateur: dev/02-systeme/api/ui-system.md
                  - Système d'unités: dev/02-systeme/api/unit-system.md
                - Modules:
                  - Composants: dev/02-systeme/modules/components.md
                  - Processeurs: dev/02-systeme/modules/processors.md
                  - Gestionnaires: dev/02-systeme/modules/managers.md
                  - Capacités spéciales: dev/02-systeme/modules/special-capacity-system.md
                  - Gestionnaire de sprites: dev/02-systeme/modules/sprite-manager.md
                  - Système de vision: dev/02-systeme/modules/vision-system.md
                  - Système d'IA: dev/02-systeme/modules/ai-system.md
                  - Gestionnaire de processeurs IA: dev/02-systeme/modules/ai-processor-manager.md
                  - Outil d'analyse de benchmarks: dev/02-systeme/modules/benchmark-analysis.md
                - Optimisations de rendu: dev/02-systeme/rendering_optimizations.md
              - 3. Installation:
                - Exigences matérielles: dev/03-installation/requirements.md
              - 4. Configuration:
                - Configuration: dev/04-configuration/configuration.md
                - Galad Config Tool: dev/04-configuration/galad-config-tool-technical.md
                - Mode debug: dev/04-configuration/debug-mode.md
                - Localisation: dev/04-configuration/localization.md
              - 5. Exploitation:
                - Paramètres système: dev/05-exploitation/systeme.md
                - Opérations système: dev/05-exploitation/operations.md
                - Déploiement: dev/05-exploitation/deployment.md
              - 6. Maintenance:
                - Maintenance: dev/06-maintenance/maintenance.md
                - Gestion des versions: dev/06-maintenance/versioning.md
              - 7. Annexes:
                - Guide de contribution: dev/07-annexes/contributing.md
            - 💬 Support et Contact: support.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ethann59/Galad-Islands